name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow this job to upload release assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Tauri pulls the bundle config from tauri.conf.json, but per-OS signing is
  # driven by the environment variables below. When a secret is empty the
  # corresponding signing step is skipped (the bundle still builds, just
  # unsigned / un-notarized) so the pipeline stays green before certs exist.

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libjavascriptcoregtk-4.1-dev libxdo-dev

      - name: Install system dependencies (Windows)
        if: matrix.platform == 'windows'
        run: |
          # WiX is required for the .msi target.
          choco install wixtoolset -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Build Tauri bundles (macOS)
        if: matrix.platform == 'macos'
        env:
          # Deliberately NO Apple credentials: we do not sign or notarize, so
          # the build never touches any Apple Developer account (local or CI).
          # Tauri falls back to ad-hoc signing (no identity), producing an
          # unsigned .dmg. On a clean Mac it will still show Gatekeeper's
          # "unidentified developer" warning — bypass with right-click → Open,
          # or users can self-sign with their own free Apple ID if desired.
          APPLE_SIGNING_IDENTITY: ""
          CI: "true"
        run: cargo tauri build
        working-directory: ./src-tauri

      - name: Build Tauri bundles (Windows)
        if: matrix.platform == 'windows'
        env:
          # Deliberately NO code-signing credentials: like macOS, the Windows
          # build produces an unsigned .exe/.msi. SmartScreen will warn on
          # download, but no certificate authority or account is contacted.
          # (Self-signing can be added later by the user if they own a cert.)
          CI: "true"
        run: cargo tauri build
        working-directory: ./src-tauri

      - name: Build Tauri bundles (Linux)
        if: matrix.platform == 'linux'
        run: cargo tauri build
        working-directory: ./src-tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coleoptera-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
